global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Prometheus tự scrape.
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Spring Boot (Actuator + micrometer-registry-prometheus) chạy trên máy HOST.
  # Prometheus chạy trong container → dùng host.docker.internal (Docker Desktop + Linux có extra_hosts host-gateway).
  # Trên Droplet Linux không dùng Docker cho app: thay bằng IP private của Droplet hoặc 172.17.0.1.
  - job_name: apigateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8088

  - job_name: commonservice
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: messegeservice
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8082
